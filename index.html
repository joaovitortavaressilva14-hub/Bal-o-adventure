<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balão Adventure</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #000; display: flex; justify-content: center; }
        #game-container { position: relative; width: 100vw; max-width: 450px; height: 100vh; background: #ADD8E6; overflow: hidden; }
        canvas { display: block; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 10; }
        h1 { font-size: 2.5rem; margin-bottom: 20px; text-transform: uppercase; }
        .btn { padding: 15px 35px; font-size: 1.2rem; border: none; border-radius: 50px; cursor: pointer; margin: 10px; text-decoration: none; font-weight: bold; }
        .btn-play { background: #4CAF50; color: white; }
        .btn-discord { background: #5865F2; color: white; }
        #score-text { position: absolute; top: 10px; left: 15px; font-size: 24px; color: #333; font-weight: bold; z-index: 5; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-text">Pontos: 0</div>
    
    <div id="start-menu" class="overlay">
        <h1>Balão Adventure</h1>
        <a href="https://discord.gg/Sj953mReyF" target="_blank" class="btn btn-discord">Junte-se ao Discord!</a>
        <button class="btn btn-play" onclick="startGame()">Jogar</button>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1 style="font-size: 3rem;">PERDEU!</h1>
        <p id="final-score" style="font-size: 1.5rem;">Pontuação: 0</p>
        <p id="best-score" style="font-size: 1.2rem; opacity: 0.8;">Recorde: 0</p>
        <button class="btn btn-play" onclick="startGame()" style="margin-top: 30px;">Tentar Novamente</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score-text');
    
    canvas.width = Math.min(window.innerWidth, 450);
    canvas.height = window.innerHeight;

    let balloon, obstacles, coins, score, gameRunning, frameCount, record = localStorage.getItem('balaoRec') || 0;

    function init() {
        balloon = { x: 60, y: canvas.height/2, radius: 14, vel: 0, gravity: 0.3, lift: -6 };
        obstacles = []; coins = []; score = 0; frameCount = 0; gameRunning = true;
    }

    function startGame() {
        document.getElementById('start-menu').classList.add('hidden');
        document.getElementById('game-over').classList.add('hidden');
        init();
        animate();
    }

    // Input (Clique ou Toque)
    const flap = () => { if(gameRunning) balloon.vel = balloon.lift; };
    window.addEventListener('mousedown', flap);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); });

    function animate() {
        if(!gameRunning) return;
        ctx.clearRect(0,0,canvas.width, canvas.height);

        // Movimento Balão
        balloon.vel += balloon.gravity;
        balloon.y += balloon.vel;
        if(balloon.y > canvas.height || balloon.y < 0) return die();

        // Desenha Balão (Igual do vídeo: círculo vermelho com linha embaixo)
        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(balloon.x, balloon.y, balloon.radius, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "#555";
        ctx.beginPath(); ctx.moveTo(balloon.x, balloon.y + balloon.radius);
        ctx.lineTo(balloon.x, balloon.y + balloon.radius + 8); ctx.stroke();

        // Obstáculos (Barras Pretas com Espinhos)
        if(frameCount % 90 === 0) {
            let gap = 180;
            let topH = Math.random() * (canvas.height - gap - 100) + 50;
            obstacles.push({ x: canvas.width, top: topH, bot: canvas.height - topH - gap, width: 60, passed: false });
        }

        obstacles.forEach((obs, i) => {
            obs.x -= 4;
            ctx.fillStyle = "#333";
            // Barras
            ctx.fillRect(obs.x, 0, obs.width, obs.top);
            ctx.fillRect(obs.x, canvas.height - obs.bot, obs.width, obs.bot);
            
            // Desenhar Espinhos (Igual no vídeo)
            ctx.fillStyle = "#333";
            for(let j=0; j<obs.width; j+=10) {
                // Espinhos de cima
                ctx.beginPath(); ctx.moveTo(obs.x+j, obs.top); ctx.lineTo(obs.x+j+5, obs.top+15); ctx.lineTo(obs.x+j+10, obs.top); ctx.fill();
                // Espinhos de baixo
                ctx.beginPath(); ctx.moveTo(obs.x+j, canvas.height-obs.bot); ctx.lineTo(obs.x+j+5, canvas.height-obs.bot-15); ctx.lineTo(obs.x+j+10, canvas.height-obs.bot); ctx.fill();
            }

            // Colisão
            if(balloon.x + 10 > obs.x && balloon.x - 10 < obs.x + obs.width) {
                if(balloon.y - 10 < obs.top || balloon.y + 10 > canvas.height - obs.bot) die();
            }
            if(!obs.passed && obs.x < balloon.x) { obs.passed = true; score++; scoreElement.innerText = "Pontos: " + score; }
        });

        // Moedas Amarelas
        if(frameCount % 120 === 0) coins.push({ x: canvas.width + 50, y: Math.random() * (canvas.height-100)+50 });
        coins.forEach((c, i) => {
            c.x -= 4;
            ctx.fillStyle = "yellow";
            ctx.beginPath(); ctx.arc(c.x, c.y, 10, 0, Math.PI*2); ctx.fill();
            // Pegar moeda
            let d = Math.hypot(balloon.x - c.x, balloon.y - c.y);
            if(d < 25) { score += 2; coins.splice(i, 1); scoreElement.innerText = "Pontos: " + score; }
        });

        obstacles = obstacles.filter(o => o.x > -100);
        coins = coins.filter(c => c.x > -100);
        frameCount++;
        requestAnimationFrame(animate);
    }

    function die() {
        gameRunning = false;
        if(score > record) { record = score; localStorage.setItem('balaoRec', record); }
        document.getElementById('final-score').innerText = "Pontuação: " + score;
        document.getElementById('best-score').innerText = "Recorde: " + record;
        document.getElementById('game-over').classList.remove('hidden');
    }
</script>
</body>
</html>
